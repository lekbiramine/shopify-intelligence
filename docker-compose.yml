services:
  postgres:
    image: postgres:16-alpine
    container_name: shopify_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-shopify}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shopify}
      POSTGRES_DB: ${DB_NAME:-shopify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shopify-automation:local
    container_name: shopify_app
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-shopify}
      DB_USER: ${DB_USER:-shopify}
      DB_PASSWORD: ${DB_PASSWORD:-shopify}
    volumes:
      - ./:/app
      - ./logs:/app/logs
      - ./reports:/app/reports
    command: ["python", "main.py", "--task", "full"]

volumes:
  postgres_data: